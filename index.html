<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register / Login</title>
	<link rel="icon" href="/images/logo.jpeg">

    <!-- Main CSS -->
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="logo">
       
        <img src="/images/logo_no_background.jpeg" alt="shambasphere-logo">
    </div>
    </div>

<div id="container" class="container">
		<!-- FORM SECTION -->
		<div class="row">
			<!-- SIGN UP -->
			<div class="col align-items-center flex-col sign-up">
				<div class="form-wrapper align-items-center">
					<div class="form sign-up">
						<div class="input-group">
							<i class='bx bxs-user'></i>
							<input type="text" placeholder="Username">
						</div>
						<div class="input-group">
							<i class='bx bx-mail-send'></i>
							<input type="email" placeholder="Email">
						</div>
                        <div class="input-group">
							<i class='bx bxs-lock-alt'></i>
							<input type="number" placeholder="mobile number">
						</div>
						<div class="input-group">
							<i class='bx bxs-lock-alt'></i>
							<input type="password" placeholder="Password">
						</div>
						<div class="input-group">
							<i class='bx bxs-lock-alt'></i>
							<input type="password" placeholder="Confirm password">
						</div>
                        <div class="input-group">
							<select name="" id="" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid var(--gray);">
                                <option value=""></option>
                                <option value="">Farmer</option>
                                <option value="">Buyer</option>
                                <option value="">Agronomist</option>
                                <option value="">Agricultural Extension Officer</option>
                                <option value="">Agricultural Researcher</option>
                                <option value="">Agricultural Consultant</option>




                              
                            </select>
						</div>
						<button>
							Sign up
						</button>
						<p>
							<span>
								Already have an account?
							</span>
							<b onclick="toggle()" class="pointer">
								Sign in here
							</b>
						</p>
					</div>
				</div>
			
			</div>
			<!-- END SIGN UP -->
			<!-- SIGN IN -->
			<div class="col align-items-center flex-col sign-in">
				<div class="form-wrapper align-items-center">
					<div class="form sign-in">
						<div class="input-group">
							<i class='bx bxs-user'></i>
							<input type="text" placeholder="Username">
						</div>
						<div class="input-group">
							<i class='bx bxs-lock-alt'></i>
							<input type="password" placeholder="Password">
						</div>
						<button>
							Sign in
						</button>
						<p>
							<b>
								Forgot password?
							</b>
						</p>
						<p>
							<span>
								Don't have an account?
							</span>
							<b onclick="toggle()" class="pointer">
								Sign up here
							</b>
						</p>
					</div>
				</div>
				<div class="form-wrapper">
		
				</div>
			</div>
			<!-- END SIGN IN -->
		</div>
		<!-- END FORM SECTION -->
		<!-- CONTENT SECTION -->
		<div class="row content-row">
			<!-- SIGN IN CONTENT -->
			<div class="col align-items-center flex-col sign-in" style="color: red;">

                <div class="img-sign-in" >
                       </div>



				<div class="text sign-in">
                   
					<h2>
						Welcome to ShambaSphere 
                    </h2>
                    <p style="font-size: 20px;">powering smart agriculture through technology. 🌱💻</p> 
                    
	
				</div>
				<div class="img sign-in">
                   
				</div>
			</div>
			<!-- END SIGN IN CONTENT -->
			<!-- SIGN UP CONTENT -->
			<div class="col align-items-center flex-col">
				<div class="img sign-up">
				
				</div>
				<div class="text sign-up">
					<h2 style="color: white-space: inherit;font-size: 50px;font-weight: bold; background: rgba(0, 0, 0, 0.384); padding: 10px;">
						Join with us
					</h2>
                    <p style="color:white;font-size: 20px;font-weight: bold; background: rgba(0, 0, 0, 0.384); padding: 10px;">and experience the power of technology in modern agriculture. 🌐🌱</p>
	
				</div>
			</div>
			<!-- END SIGN UP CONTENT -->
		</div>
		<!-- END CONTENT SECTION -->
	</div>

<script src="auth.js"></script>
</body>
</html>
